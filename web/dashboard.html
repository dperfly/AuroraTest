<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuroraTest - 仪表盘</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="/web/assets/common.css?v=16">
</head>
<body class="min-h-screen">
<div id="app" v-cloak></div>
<script src="/web/assets/common.js?v=16"></script>
<script>
const { createApp, ref, computed, onMounted } = Vue;
          
createApp({
  template: shellTemplate(`
    <div class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="bg-white rounded-xl shadow-sm p-6">
          <div class="flex items-center justify-between"><div><p class="text-gray-500 text-sm">总用例数</p><p class="text-3xl font-bold text-gray-800 mt-1">{{ totalCases }}</p></div><div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center"><i class="fas fa-file-alt text-blue-600 text-xl"></i></div></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6">
          <div class="flex items-center justify-between"><div><p class="text-gray-500 text-sm">HTTP 用例</p><p class="text-3xl font-bold text-green-600 mt-1">{{ httpCases }}</p></div><div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center"><i class="fas fa-globe text-green-600 text-xl"></i></div></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6">
          <div class="flex items-center justify-between"><div><p class="text-gray-500 text-sm">SQL 用例</p><p class="text-3xl font-bold text-purple-600 mt-1">{{ sqlCases }}</p></div><div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center"><i class="fas fa-database text-purple-600 text-xl"></i></div></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6">
          <div class="flex items-center justify-between"><div><p class="text-gray-500 text-sm">最近执行</p><p class="text-3xl font-bold text-orange-600 mt-1">{{ lastExecutions }}</p></div><div class="w-12 h-12 bg-orange-100 rounded-lg flex items-center justify-center"><i class="fas fa-play-circle text-orange-600 text-xl"></i></div></div>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-6">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">快速开始</h3>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <a href="/web/testcases.html" class="p-4 border-2 border-dashed border-gray-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition text-left"><i class="fas fa-edit text-2xl text-blue-600 mb-2"></i><p class="font-medium text-gray-800">编写测试用例</p><p class="text-sm text-gray-500">创建和管理测试用例</p></a>
          <a href="/web/graph.html" class="p-4 border-2 border-dashed border-gray-200 rounded-lg hover:border-indigo-400 hover:bg-blue-50 transition text-left"><i class="fas fa-project-diagram text-2xl text-indigo-500 mb-2"></i><p class="font-medium text-gray-800">查看依赖图</p><p class="text-sm text-gray-500">分析用例依赖关系</p></a>
          <a href="/web/execute.html" class="p-4 border-2 border-dashed border-gray-200 rounded-lg hover:border-green-400 hover:bg-green-50 transition text-left"><i class="fas fa-play-circle text-2xl text-green-600 mb-2"></i><p class="font-medium text-gray-800">执行测试</p><p class="text-sm text-gray-500">运行自动化测试</p></a>
          <a href="/web/reports.html" class="p-4 border-2 border-dashed border-gray-200 rounded-lg hover:border-purple-400 hover:bg-purple-50 transition text-left"><i class="fas fa-chart-bar text-2xl text-purple-600 mb-2"></i><p class="font-medium text-gray-800">查看报告</p><p class="text-sm text-gray-500">分析测试结果</p></a>
        </div>
      </div>
    </div>
  `),
  setup() {
    const shell = pageShell('dashboard', '仪表盘');
    const testCases = ref([]);
    const lastExecutions = ref(0);
    const totalCases = computed(() => testCases.value.reduce((sum, file) => sum + file.cases.length, 0));
    const httpCases = computed(() => testCases.value.reduce((sum, file) => sum + file.cases.filter(item => String(item.inter_type).toLowerCase() === 'http').length, 0));
    const sqlCases = computed(() => testCases.value.reduce((sum, file) => sum + file.cases.filter(item => ['mysql', 'sql'].includes(String(item.inter_type).toLowerCase())).length, 0));
    onMounted(async () => {
      await shell.initShell();
      testCases.value = await api('/testcases');
    });
    return { ...shell, testCases, totalCases, httpCases, sqlCases, lastExecutions };
  }
}).mount('#app');
</script>
</body>
</html>
